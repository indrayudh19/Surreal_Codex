<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Resting Place — The Order of the Hollow Moon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #c9a84c;
      --glow-gold: 0 0 10px rgba(201, 168, 76, 0.3), 0 0 24px rgba(201, 168, 76, 0.1);
      --void: #050508;
    }
    
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    
    body, html {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--void);
      font-family: 'Share Tech Mono', monospace;
    }
    
    .video-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    
    .video-container video {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    
    .overlay {
      position: absolute;
      top: 0; left: 0; 
      width: 100%; height: 100%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      background: linear-gradient(to bottom, rgba(5,5,8,0.8) 0%, rgba(5,5,8,0) 25%);
      pointer-events: none;
    }

    .btn-return {
      pointer-events: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      padding: 12px 28px;
      background: rgba(5,5,8,0.6);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.15em;
      border: 1px solid var(--gold);
      color: var(--gold);
      text-decoration: none;
      text-shadow: 0 0 4px rgba(201,168,76,0.5);
      backdrop-filter: blur(4px);
    }
    
    .btn-return:hover {
      background: rgba(201, 168, 76, 0.15);
      box-shadow: var(--glow-gold);
    }
    
    /* Scanline effect to maintain game aesthetics */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0, 0, 0, 0.04) 2px, rgba(0, 0, 0, 0.04) 3px
      );
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Background Video -->
  <div class="video-container">
    <video src="assets/resting_place.mp4" autoplay loop muted playsinline></video>
  </div>

  <!-- UI Overlay -->
  <div class="overlay">
    <a href="index.html" class="btn-return">[ RESUME QUEST ]</a>
  </div>

  <!-- Script for Persistence: Restoring Health -->
  <script src="vigil.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      try {
        const vigil = getVigil();
        // Fully restore health upon entering the Resting Place
        if (vigil && vigil.maxHp) {
          vigil.hp = vigil.maxHp;
          saveVigil(vigil);
          console.log("Health fully restored to " + vigil.maxHp);
        }
      } catch (e) {
        console.error("Failed to access save data to restore health:", e);
      }
    });
  </script>
</body>
</html>
